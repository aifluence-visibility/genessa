# Engine worker: runs approved prompts across Claude, GPT, and Perplexity.
# Prereq: set at minimum NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# and at least one engine key (ANTHROPIC_API_KEY, OPENAI_API_KEY, PERPLEXITY_API_KEY).
#
# Example:
#   set -a && source .env.local && set +a
#   docker compose -f compose.engine-worker.yml up --build

services:
  engine-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: ["node", "scripts/engine-worker.mjs"]
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?Set NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY}
      INTERNAL_API_SUPABASE_URL: ${INTERNAL_API_SUPABASE_URL:-}
      # Engine keys — at least one required
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      # Model overrides
      ENGINE_CLAUDE_MODEL: ${ENGINE_CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      ENGINE_GPT_MODEL: ${ENGINE_GPT_MODEL:-gpt-4o-mini}
      ENGINE_PERPLEXITY_MODEL: ${ENGINE_PERPLEXITY_MODEL:-llama-3.1-sonar-small-128k-online}
      # Worker tuning
      ENGINE_WORKER_POLL_MS: ${ENGINE_WORKER_POLL_MS:-60000}
      ENGINE_WORKER_BATCH: ${ENGINE_WORKER_BATCH:-5}
      ENGINE_WORKER_REPEATS: ${ENGINE_WORKER_REPEATS:-3}
      ENGINE_WORKER_DELAY_MS: ${ENGINE_WORKER_DELAY_MS:-500}
      ENGINE_WORKER_STALE_MS: ${ENGINE_WORKER_STALE_MS:-1800000}
      ENGINE_TIMEOUT_MS: ${ENGINE_TIMEOUT_MS:-30000}
