# Agent worker only — same image as `Dockerfile.worker`.
# Prereq: shell’de veya bir env dosyasında en azından şunlar tanımlı olsun:
#   NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# İsteğe bağlı: OPENAI_API_KEY, INTERNAL_WORKER_POLL_MS, WORKER_HEALTH_DEEP, vb.
#
# Örnek:
#   set -a && source .env.local && set +a
#   docker compose -f compose.worker.yml up --build
#
# Ya da:
#   docker compose -f compose.worker.yml --env-file .env.local up --build

services:
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?Set NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY}
      INTERNAL_API_SUPABASE_URL: ${INTERNAL_API_SUPABASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GENESSA_OPENAI_API_KEY: ${GENESSA_OPENAI_API_KEY:-}
      INTERNAL_WORKER_LLM: ${INTERNAL_WORKER_LLM:-}
      INTERNAL_WORKER_POLL_MS: ${INTERNAL_WORKER_POLL_MS:-5000}
      INTERNAL_WORKER_STALE_RUNNING_MS: ${INTERNAL_WORKER_STALE_RUNNING_MS:-900000}
      INTERNAL_WORKER_LLM_TASK_TYPES: ${INTERNAL_WORKER_LLM_TASK_TYPES:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      INTERNAL_WORKER_OPENAI_MODEL: ${INTERNAL_WORKER_OPENAI_MODEL:-}
      WORKER_HEALTH_DEEP: ${WORKER_HEALTH_DEEP:-}
